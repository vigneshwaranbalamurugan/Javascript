<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery Lightbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gallery">
        <img src="assets/html.png" alt="HTML" class="gallery-image">
        <img src="assets/css.png" alt="CSS" class="gallery-image">
        <img src="assets/js.png" alt="JS" class="gallery-image">
    </div>

    <div id="overlay" class="overlay">
        <button class="close" id="close">close</button>
        <img class="overlay-image" id="overlay-img">
    </div>

    <script src="script.js"></script>
</body>
</html>
